name: icesee1
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Core runtime 
  - numpy
  - scipy
  - h5py
  - pyyaml
  - psutil
  - tqdm
  - dask
  - pandas
  - matplotlib

  # Notebook stack (GHUB + local browser runs)
  - jupyterlab<2.0
  - notebook
  - ipywidgets
  - ipykernel
  - nbformat
  - nbclient
  - jupyter_client

  # Notw: "run report notebook" pipeline
  - pip:
      - papermill