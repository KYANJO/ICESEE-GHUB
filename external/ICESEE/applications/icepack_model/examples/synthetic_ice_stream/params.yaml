physical-parameters:
  # Domain parameters
  Lx: 50e2        # (m)
  Ly: 12e2        # (m)
  nx: 12         # number of elements in the x-direction
  ny: 8      # number of elements in the y-direction
  degree: 2       # degree of the polynomial basis functions

  # Bedrock slopes 
  b_in: 200       # (m) above sea level at the inflow
  b_out: -400.0     # (m) at the terminus

  # Surface Elevation
  s_in: 850       # (m)
  s_out: 50       # (m)

  # Guess for initial velocity
  u_in:  20       # (m/yr)
  u_out: 2400     # (m/yr)

modeling-parameters:
  # Model parameters
  T: 255.0                # (K) temperature
  a_in: 1.7               # accumulation rate at the inflow
  da:   -2.7              # change of accumulation rate
  a_in_p: 0.17            # nurged accumulation rate at the inflow
  da_p: -0.27           # nurged change of accumulation rate
  num_years: 100          # number of years to run the model
  timesteps_per_year: 2   # number of timesteps per year

enkf-parameters:
  # Ensemble Kalman Filter parameters
  Nens: 40                      # number of ensemble members (now set in the command line)
  freq_obs: 8              # frequency of observations
  obs_max_time: 80         # maximum time for observations
  obs_start_time: 4             # start time for observations

  num_state_vars: 3       # number of state variables  [h,u,v]
  num_param_vars: 1       # number of parameter variables [smb]
  vec_inputs: ['h','u','v','smb']
  observed_vars: ['h','u','v']   #['h','u','v']
  observed_params: ['smb']  #['smb']

  generate_synthetic_obs: "True"  # Generate synthetic observations for testing
  generate_true_state:    "True"  # Generate true state for synthetic observations
  generate_nurged_state:  "True"  # Generate nudged state for synthetic observations
  initialize_ensemble: "True"
  use_ensemble_pertubations: "True" # Use ensemble perturbations for ensemble state
  initial_spread_factor: 1.25
  sequential_ensemble_initialization: "False"  # Sequential ensemble initialization (True for sequential, False for parallel)


  # Statistical parameters (based on the number of state variables)
  sig_model: [0.1,0.1,0.1] # model error standard deviation
  sig_obs: [10,4,2,0.1]   # observation error standard deviation
  sig_Q: [0.8,0.4,0.01,0.08]    # process noise standard deviation
  length_scale: [128,128,125,130] #[150, 150, 150, 150]   # length scale for the covariance matrix, can be a list

  Q_rho: 0.95 

  seed: 1                 # seed for random number generator
  inflation_factor: 1.0          # inflation factor
  localization_flag: False      # localization flag: True, False

  # estimation flags
  joint_estimation: 1 # joint estimation flag: True, False
  parameter_estimation: True # parameter estimation flag: True, False
  joint_estimated_params: ['smb']  # parameters to be jointly estimated

  # nurged parameters
  h_nurge_ic: 350         # nurged increment for initial thickness
  u_nurge_ic: 0         # nurged increment for initial velocity
  nurged_entries_percentage: 0.25 #%     # percentage of nurged entries in the state vector

  # enkf model parameters
  model_name: "icepack"               # name of the model
  model_solver: "solver_weertman"     # name of the solver
  filter_type: "EnKF"               # name of the filter: EnKF, DEnKF, EnTKF, EnRSKF
  local_analysis: False           # local analysis flag: True, False, global analysis is default
  parallel_flag: "MPI_model"             # parallel flag: Serial, MPI, MPI_model
  n_modeltasks: 1                     # number of model tasks (for MPI)
  commandlinerun: "True"              # command line run flag: True, False
  execution_flag: 0                  #`execution flag: 0 ->default, 1 -> sequntial, 2 -> even_distribution_of_problem size, 3 -> even_distribution_of_problem size with load balancing
  execution_mode: 1                 # execution mode: 0 -> serial, 1 -> partial parallel_run, 2 -> fully parallel run
  data_path: _modelrun_datasets
  ICESEE_PERFORMANCE_TEST: False

  # HDF5 file parameters for the full parallel runs
  h5_file_compression: None    # None, "gzip" or "lzf" 
  h5_file_compression_level: 4   # Compression level (1-9 for gzip only)
  h5_file_chunk_size: 1000       # Chunk size for HDF5
  serial_file_creation: True  # Create HDF5 files in serial (True) or parallel (False)
  collective_threshold: 4
  batch_size: 200            # Batch size for writing HDF5 files

  # restart parameters (only available for fully parallel runs)
  restart_enabled: 1         # Enable restart functionality
  force_fresh_start: 1       # Force fresh start even if checkpoints exist
  checkpoint_every: 5           # Frequency of checkpoints (every 5 assimilation cycles)
  base_seed: 42                 # Base seed for reproducibility
  k_start_override: 40       # Start overwrite from this assimilation cycle
