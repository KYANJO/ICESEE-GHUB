name: Run ICESEE (GHUB)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runner deps + ICESEE core
        run: |
          python -m pip install -U pip
          pip install "ICESEE @ git+https://github.com/ICESEE-project/ICESEE.git@v0.1.9"
          # or pin to a commit hash:
          # pip install "ICESEE @ git+https://github.com/ICESEE-project/ICESEE.git@<COMMIT>"

      - name: Smoke test
        run: |
          python -c "import ICESEE; print('ICESEE:', ICESEE.__file__)"