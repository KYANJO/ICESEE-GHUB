name: Update ICESEE subtree

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add/fetch upstream
        run: |
          git remote add icesee-upstream https://github.com/ICESEE-project/ICESEE.git || true
          git fetch icesee-upstream

      - name: Subtree pull
        run: |
          git subtree pull --prefix=external/ICESEE icesee-upstream main --squash || exit 0

      - name: Record upstream SHA
        run: |
          git rev-parse icesee-upstream/main > external/ICESEE_UPSTREAM_SHA.txt
          git add external/ICESEE_UPSTREAM_SHA.txt || true

      - name: Push if changes
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git add external/ICESEE
          git commit -m "CI: update ICESEE subtree" || exit 0
          git push