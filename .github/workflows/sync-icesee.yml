name: Sync ICESEE submodule

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC (change anytime)

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update ICESEE submodule to latest main
        run: |
          git submodule update --remote --merge external/ICESEE
          git status

      - name: Create PR if changed
        uses: brian-kyanjo/create-pull-request@v6
        with:
          branch: automation/sync-icesee
          delete-branch: true
          commit-message: "Bump ICESEE submodule (main)"
          title: "Sync ICESEE (main) into ICESEE-GHUB"
          body: "Automated update of ICESEE submodule to latest commit on main."